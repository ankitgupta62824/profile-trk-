<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit Gupta - Links</title>
    <style>
        /* Basic Reset */
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* Main Container */
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        /* Admin Button (Top Right) */
        .admin-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: #333; color: white;
            border: none; padding: 8px 15px;
            border-radius: 20px; cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        .admin-btn:hover { background: #555; }

        /* Profile Section */
        .profile h1 { margin: 10px 0 5px; color: #333; font-size: 24px; }
        .profile p { color: #666; margin: 0; }

        /* Social Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px; margin-top: 30px;
        }
        .social-card {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; padding: 15px; border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
            background: #fff; border: 1px solid #eee;
        }
        .social-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .social-icon { width: 50px; height: 50px; margin-bottom: 10px; }
        .social-card span { color: #333; font-weight: 600; font-size: 14px; }

        /* --- LOGIN MODAL STYLES --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 15px;
            width: 90%; max-width: 400px; text-align: center;
            position: relative;
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 15px 0;
            border: 1px solid #ddd; border-radius: 8px;
        }
        .modal-content button {
            width: 100%; padding: 12px; background: #1877F2;
            color: white; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer;
        }
        .close-btn {
            position: absolute; top: 10px; right: 15px;
            font-size: 24px; cursor: pointer; color: #aaa;
        }
        .error-msg { color: red; font-size: 14px; margin-top: 10px; }

        /* --- DASHBOARD STYLES --- */
        .dashboard { margin-top: 20px; text-align: left; }
        .stat-box {
            background: #f0f2f5; padding: 15px; border-radius: 10px;
            margin-bottom: 15px; text-align: center;
        }
        .stat-box h2 { margin: 0; color: #1877F2; }
        .visitor-list {
            max-height: 200px; overflow-y: auto;
            background: #f9f9f9; padding: 10px; border-radius: 10px;
            font-size: 13px;
        }
        .visitor-item {
            padding: 8px; border-bottom: 1px solid #eee;
            display: flex; justify-content: space-between;
        }
        .logout-btn {
            margin-top: 15px; background: #eee; color: #333;
            padding: 8px 20px; border: none; border-radius: 5px; cursor: pointer;
        }

    </style>
</head>
<body>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Admin Button -->
        <button class="admin-btn" id="openLoginBtn">Admin Login</button>

        <!-- Profile Section -->
        <div class="profile" id="mainProfile">
            <h1>Ankit Gupta</h1>
            <p>@ankitgupta62824</p>
        </div>

        <!-- Dashboard (Initially Hidden) -->
        <div id="adminDashboard" style="display:none;">
            <h2>Admin Dashboard</h2>
            <div class="stat-box">
                <p>Total Visitors</p>
                <h2 id="dashTotalVisits">0</h2>
            </div>
            <h3>Recent Visitors</h3>
            <div class="visitor-list" id="visitorListContainer">
                <!-- Visitor data will load here -->
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <!-- Social Icons -->
        <div class="social-grid" id="socialContainer"></div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2>Admin Panel</h2>
            <input type="password" id="passwordInput" placeholder="Enter Password">
            <button id="loginSubmitBtn">Login</button>
            <div class="error-msg" id="loginError"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, increment, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // --- FIREBASE CONFIG (Apni details yahan dalein) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // --- ADMIN PASSWORD (Apna password yahan likhein) ---
        const ADMIN_PASSWORD = "ankit123"; 

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- DOM Elements ---
        const loginModal = document.getElementById('loginModal');
        const openLoginBtn = document.getElementById('openLoginBtn');
        const closeModal = document.getElementById('closeModal');
        const loginSubmitBtn = document.getElementById('loginSubmitBtn');
        const passwordInput = document.getElementById('passwordInput');
        const loginError = document.getElementById('loginError');
        const mainProfile = document.getElementById('mainProfile');
        const adminDashboard = document.getElementById('adminDashboard');
        const socialContainer = document.getElementById('socialContainer');
        const dashTotalVisits = document.getElementById('dashTotalVisits');
        const visitorListContainer = document.getElementById('visitorListContainer');
        const logoutBtn = document.getElementById('logoutBtn');

        // --- 1. Visitor Tracking Logic (Chalta rahega) ---
        async function trackVisitor() {
            let userId = localStorage.getItem('social_user_id');
            if (!userId) {
                userId = 'user_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('social_user_id', userId);
            }

            const userDocRef = doc(db, "visitors", userId);
            const totalVisitsRef = doc(db, "stats", "total_visits");

            try {
                const userSnap = await getDoc(userDocRef);
                if (userSnap.exists()) {
                    await setDoc(userDocRef, { 
                        lastVisit: new Date().toLocaleString('hi-IN'),
                        count: increment(1) 
                    }, { merge: true });
                } else {
                    await setDoc(userDocRef, {
                        id: userId,
                        firstVisit: new Date().toLocaleString('hi-IN'),
                        lastVisit: new Date().toLocaleString('hi-IN'),
                        count: 1
                    });
                }
                await setDoc(totalVisitsRef, { count: increment(1) }, { merge: true });
            } catch (error) {
                console.error("Error tracking: ", error);
            }
        }
        trackVisitor();

        // --- 2. Admin Login Logic ---
        openLoginBtn.addEventListener('click', () => {
            loginModal.style.display = 'flex';
        });

        closeModal.addEventListener('click', () => {
            loginModal.style.display = 'none';
            loginError.innerText = "";
        });

        loginSubmitBtn.addEventListener('click', () => {
            const pass = passwordInput.value;
            if (pass === ADMIN_PASSWORD) {
                loginModal.style.display = 'none';
                loadDashboard();
            } else {
                loginError.innerText = "Galat Password Hai!";
            }
        });

        logoutBtn.addEventListener('click', () => {
            adminDashboard.style.display = 'none';
            mainProfile.style.display = 'block';
            socialContainer.style.display = 'grid';
            openLoginBtn.style.display = 'block';
        });

        // --- 3. Load Dashboard Data ---
        async function loadDashboard() {
            // Hide Profile/Social, Show Dashboard
            mainProfile.style.display = 'none';
            socialContainer.style.display = 'none';
            adminDashboard.style.display = 'block';
            openLoginBtn.style.display = 'none';

            // Load Total Count
            const totalSnap = await getDoc(doc(db, "stats", "total_visits"));
            if (totalSnap.exists()) {
                dashTotalVisits.innerText = totalSnap.data().count;
            }

            // Load Visitor List (Last 10)
            visitorListContainer.innerHTML = "Loading...";
            const q = query(collection(db, "visitors"), orderBy("lastVisit", "desc"), limit(10));
            const querySnapshot = await getDocs(q);
            
            let html = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                html += `
                    <div class="visitor-item">
                        <div>
                            <div style="font-weight:bold">${data.id}</div>
                            <div style="font-size:11px; color:#666">${data.lastVisit}</div>
                        </div>
                        <div style="background:#1877F2; color:white; padding:2px 8px; border-radius:10px; height:fit-content">
                            ${data.count}x
                        </div>
                    </div>
                `;
            });
            visitorListContainer.innerHTML = html || "No visitors yet.";
        }

        // --- Social Icons Logic ---
        const username = "ankitgupta62824";
        const socialPlatforms = [
            { name: "Instagram", url: `https://instagram.com/${username}`, icon: `<svg class="social-icon" viewBox="0 0 24 24" fill="url(#ig-gradient)" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="ig-gradient" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#FFDC80"/><stop offset="50%" stop-color="#F56040"/><stop offset="100%" stop-color="#833AB4"/></linearGradient></defs><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>` },
            { name: "YouTube", url: `https://youtube.com/@${username}`, icon: `<svg class="social-icon" viewBox="0 0 24 24" fill="#FF0000" xmlns="http://www.w3.org/2000/svg"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>` },
            { name: "Facebook", url: `https://facebook.com/${username}`, icon: `<svg class="social-icon" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>` },
            { name: "Telegram", url: `https://t.me/${username}`, icon: `<svg class="social-icon" viewBox="0 0 24 24" fill="#26A5E4" xmlns="http://www.w3.org/2000/svg"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>` },
            { name: "X (Twitter)", url: `https://x.com/${username}`, icon: `<svg class="social-icon" viewBox="0 0 24 24" fill="#000" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>` }
        ];

        socialPlatforms.forEach(platform => {
            const link = document.createElement('a');
            link.href = platform.url;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            link.classList.add('social-card');
            link.innerHTML = platform.icon;
            const nameSpan = document.createElement('span');
            nameSpan.innerText = platform.name;
            link.appendChild(nameSpan);
            socialContainer.appendChild(link);
        });

    </script>
</body>
</html>
